name: Publish to Maven Central

on:
  release:
    types: [published]   # GitHub Release 생성 시 자동 실행
  workflow_dispatch:     # 수동 실행

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AAR
        run: ./gradlew :sdk:assembleRelease

      - name: Import GPG key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          printf '%s' "$SIGNING_KEY" | tr -d '\r' | gpg --batch --import
          gpg --batch --export-secret-keys --output /tmp/secring.gpg 698075ED

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          ./gradlew :sdk:publishAndReleaseToMavenCentral \
            -Psigning.keyId=698075ED \
            "-Psigning.password=" \
            -Psigning.secretKeyRingFile=/tmp/secring.gpg
